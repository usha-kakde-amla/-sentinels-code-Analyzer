name: ✅ Approve & Commit Rule

# Triggered when the approver clicks "Approve & Add Rule" in the email.
# The link opens GitHub Actions with inputs pre-filled.
# Approver clicks "Run workflow" — that's the only manual step required.

on:
  workflow_dispatch:
    inputs:
      rule:
        description: 'Base64url-encoded rule JSON (auto-filled from email link)'
        required: true
        type: string
      pr:
        description: 'PR number this rule came from'
        required: false
        type: string

  # Optional: headless one-click flow via a webhook proxy
  repository_dispatch:
    types: [approve-rule]

permissions:
  contents: write       # commit the new rule file
  pull-requests: write  # comment on the originating PR

jobs:
  commit-rule:
    name: Commit approved rule to rules/
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Decode rule payload
      - name: Decode rule payload
        id: decode
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RULE_B64="${{ github.event.client_payload.rule }}"
            PR_NUM="${{ github.event.client_payload.pr }}"
          else
            RULE_B64="${{ github.event.inputs.rule }}"
            PR_NUM="${{ github.event.inputs.pr }}"
          fi

          # base64url → standard base64 → JSON
          RULE_JSON=$(echo "$RULE_B64" | tr '_-' '/+' | base64 --decode)

          echo "Decoded rule:"
          echo "$RULE_JSON" | python3 -m json.tool || echo "$RULE_JSON"

          # Derive filename from RuleId field (matches the schema used in pr-analyzer.js)
          RULE_ID=$(echo "$RULE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rid = d.get('RuleId') or d.get('ruleId') or 'new-rule'
          print(rid.lower().replace(' ', '-'))
          ")

          echo "rule_json=$RULE_JSON" >> $GITHUB_OUTPUT
          echo "rule_id=$RULE_ID"     >> $GITHUB_OUTPUT
          echo "pr_num=$PR_NUM"       >> $GITHUB_OUTPUT

      # 3. Write rule JSON to rules/ folder
      - name: Write rule file
        run: |
          mkdir -p rules

          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          rule     = json.loads(os.environ['RULE_JSON_ENV'])
          target   = os.environ['TARGET_ENV']
          pr_num   = os.environ['PR_NUM_ENV']
          actor    = os.environ['ACTOR_ENV']

          # Stamp approval metadata
          rule['_approvedAt'] = datetime.now(timezone.utc).isoformat()
          rule['_approvedBy'] = actor
          rule['_sourcePR']   = int(pr_num) if pr_num.isdigit() else pr_num
          rule['_autoAdded']  = True

          with open(target, 'w') as f:
              json.dump(rule, f, indent=2)
              f.write('\n')

          print(f"✅ Written: {target}")
          PYEOF
        env:
          RULE_JSON_ENV: ${{ steps.decode.outputs.rule_json }}
          TARGET_ENV:    rules/${{ steps.decode.outputs.rule_id }}.json
          PR_NUM_ENV:    ${{ steps.decode.outputs.pr_num }}
          ACTOR_ENV:     ${{ github.actor }}

      # 4. Commit and push
      - name: Commit and push rule
        run: |
          RULE_ID="${{ steps.decode.outputs.rule_id }}"
          PR_NUM="${{ steps.decode.outputs.pr_num }}"

          git config user.name  "Sentinels Bot"
          git config user.email "sentinels-bot@users.noreply.github.com"

          git add "rules/${RULE_ID}.json"

          if git diff --cached --quiet; then
            echo "ℹ️  Rule already exists with identical content — nothing to commit."
          else
            git commit -m "feat(rules): add approved rule '${RULE_ID}' from PR #${PR_NUM} [skip ci]"
            git push origin HEAD
            echo "✅ Rule committed and pushed."
          fi

      # 5. Comment on the originating PR
      - name: Comment on PR
        if: steps.decode.outputs.pr_num != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ruleId = '${{ steps.decode.outputs.rule_id }}';
            const prNum  = parseInt('${{ steps.decode.outputs.pr_num }}', 10);
            if (!prNum) return;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: prNum,
              body: [
                `### ✅ New rule approved & committed`,
                ``,
                `| Field | Value |`,
                `|---|---|`,
                `| **Rule ID** | \`${ruleId}\` |`,
                `| **Approved by** | @${{ github.actor }} |`,
                `| **File** | [\`rules/${ruleId}.json\`](../../blob/main/rules/${ruleId}.json) |`,
                ``,
                `This rule will be enforced automatically in all future Sentinels analyses.`,
              ].join('\n'),
            });